<div class="register-container">
    <div class="brand-header">
        <h1>NC <span>CONTROL</span></h1>
        <p>Gestão de Não Conformidades | ISO 9001</p>
    </div>

    <div class="form-content">
        <div class="welcome-message">
            <h2>Criar conta</h2>
            <p>Preencha os dados para se registrar</p>
        </div>

        <form id="registerForm" action="/api/register" method="POST">
            <div class="input-group">
                <label for="name">Nome completo</label>
                <div class="input-icon">
                    <input type="text" id="name" name="name" placeholder="Seu nome" autocomplete="name" required>
                </div>
            </div>

            <div class="input-group">
                <label for="email">E-mail institucional</label>
                <div class="input-icon">
                    <input type="email" id="email" name="email" placeholder="seunome@email.com" autocomplete="email" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <div class="input-icon">
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password" required>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirmar senha</label>
                <div class="input-icon">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" autocomplete="off" required>
                </div>
            </div>

            <div class="options-row">
                <label class="checkbox-label">
                    <input type="checkbox" id="termsCheck" name="terms" required> Aceito os <a href="/termos" class="terms-link">termos de uso</a>
                </label>
            </div>

            <button type="submit" class="btn-register">Cadastrar</button>
        </form>

        <div class="login-link">
            <p>Já tem uma conta? <a href="/login">Faça login</a></p>
        </div>
    </div>

    <div class="demo-note">
        <p>Sistema de Gestão de Não Conformidades - NC CONTROL</p>
    </div>
</div>
