<div class="login-page page-layout">
  <div class="login-wrapper page-center-card">
    <header class="login-header">
      <h1>NC CONTROL</h1>
      <p>ALGUM SUBTITULO OU SLOGAN</p>
    </header>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">E-MAIL</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined">email</span>
          <input id="email" type="email" formControlName="email" placeholder="E-MAIL" />
        </div>
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <span class="field-error">{{ getFirstError('email') }}</span>
        }
      </div>

      <div class="form-group">
        <label for="password">SENHA</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined">key</span>
          <input id="password" type="password" formControlName="password" placeholder="•••••••••" />
        </div>
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <span class="field-error">{{ getFirstError('password') }}</span>
        }
      </div>

      <button type="submit" class="login-button primary-button" [disabled]="loginForm.invalid">
        LOGIN
        <span class="material-symbols-outlined">login</span>
      </button>
    </form>
  </div>
</div>
