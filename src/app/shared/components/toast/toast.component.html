<div class="toast-container">
  @for (notification of notificationService.notifications(); track notification.id) {
    <div class="toast" [class]="'toast--' + notification.type" role="alert">
      <span class="material-symbols-outlined toast-icon">{{ iconFor(notification.type) }}</span>
      <span class="toast-message">{{ notification.message }}</span>
      <button class="toast-close" (click)="notificationService.dismiss(notification.id)" aria-label="Fechar">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
  }
</div>
